<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Break-Even Puzzle - 損益分岐点ゲーム</title>
<style>
  /* === Kaikei風のデザインシステム === */
  :root {
    --bg: #f7f7f5;
    --card: #ffffff;
    --text: #333333;
    --text-secondary: #666666;
    --muted: #a0a0a0;
    --border-strong: #222222;
    --r-md: 8px;
    --r-xl: 16px;
    --r-full: 9999px;
    
    /* 会計ブロックカラー (パステル調) */
    --c-fixed: #ffdcb5;   /* 固定費: オレンジ */
    --c-var: #fca5a5;     /* 変動費: 赤 */
    --c-rev: #bbf7d0;     /* 売上: 緑 */
    --c-profit: #fef08a;  /* 利益: 黄 */
    --c-loss: #e5e5e5;    /* 赤字: グレー */
  }

  * { box-sizing: border-box; }
  body { 
    margin: 0; background: var(--bg); color: var(--text); 
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; 
  }

  /* ヘッダー */
  .header {
    padding: 16px 24px; position: sticky; top: 0;
    background: rgba(247,247,245,0.92); backdrop-filter: blur(8px);
    font-weight: 900; font-size: 1.25rem; border-bottom: 1px solid rgba(0,0,0,0.05);
    z-index: 50; text-align: center; letter-spacing: -0.02em;
  }

  .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }

  /* ヒーローセクション */
  .text-center { text-align: center; }
  .title { font-size: clamp(2rem, 5vw, 2.5rem); font-weight: 900; margin-bottom: 12px; line-height: 1.2; letter-spacing: -0.03em; }
  .subtitle { font-size: 1rem; color: var(--text-secondary); margin-bottom: 40px; line-height: 1.6; font-weight: 500; }

  /* ステータスボード */
  .dashboard {
    background: var(--card); border: 2px solid var(--border-strong);
    border-radius: var(--r-xl); padding: 24px; margin-bottom: 32px;
  }
  .status-text { font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; transition: color 0.3s; }
  .status-desc { font-size: 1rem; color: var(--text-secondary); font-weight: 600; }

  /* プレイステージ (T字勘定風) */
  .stage-wrapper { display: flex; justify-content: center; margin-bottom: 40px; }
  .stage {
    width: 320px; height: 420px;
    background: var(--bg); border: 2px solid var(--border-strong);
    border-radius: var(--r-md); padding: 12px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    align-items: flex-end; /* ブロックを下から積むため */
  }

  .col {
    display: flex; flex-direction: column-reverse; /* 新しい要素ほど上に積む */
    gap: 3px; width: 100%; height: 100%;
  }

  /* 落ちモノ風ブロック */
  .block {
    width: 100%; border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.85rem; color: rgba(0,0,0,0.75);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -2px 0 rgba(0,0,0,0.08);
    transition: flex-basis 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); /* ポップなアニメーション */
    flex-basis: 0%; overflow: hidden; white-space: pre-wrap; text-align: center;
    line-height: 1.3;
  }

  .b-fixed { background: var(--c-fixed); }
  .b-var { background: var(--c-var); }
  .b-rev { background: var(--c-rev); }
  .b-profit { background: var(--c-profit); }
  .b-loss { background: var(--c-loss); color: var(--text-secondary); border: 1px dashed #ccc; box-shadow: none; }

  /* コントロール */
  .controls { display: flex; flex-direction: column; align-items: center; gap: 16px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 16px 40px; background: var(--border-strong); color: var(--card);
    border: none; border-radius: var(--r-full); font-size: 1.2rem; font-weight: 900;
    cursor: pointer; transition: transform 0.1s, box-shadow 0.15s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

  .params { display: flex; gap: 12px; font-size: 0.85rem; color: var(--text-secondary); font-weight: 700; flex-wrap: wrap; justify-content: center; }
  .params span { background: #eee; padding: 6px 12px; border-radius: var(--r-full); }

  .btn-reset {
    background: transparent; color: var(--muted); border: 2px solid var(--muted);
    padding: 8px 24px; font-size: 0.9rem; margin-top: 16px; border-radius: var(--r-full); font-weight: 700; cursor: pointer;
  }
  .btn-reset:hover { border-color: var(--border-strong); color: var(--text); }

  /* スマホ対応 */
  @media (max-width: 600px) {
    .stage { width: 100%; height: 360px; }
    .btn { width: 100%; }
  }
</style>
</head>
<body>

<div class="header">Kaikei風 - 損益分岐点ゲーム</div>

<div class="container">
  <div class="text-center">
    <h1 class="title">固定費の壁を越えろ！</h1>
    <p class="subtitle">商品を売るたびに、売上と変動費が積み上がる。<br>損益分岐点（黒字化ライン）を指先で体感しよう。</p>
  </div>

  <div class="dashboard text-center">
    <div class="status-text" id="status-title">あと -- 個で黒字！</div>
    <div class="status-desc" id="status-desc">売上: 0円 / 費用: 0円</div>
  </div>

  <div class="stage-wrapper">
    <div class="stage">
      <!-- 左側：費用＆利益 (会計の借方) -->
      <div class="col">
        <div class="block b-fixed" id="b-fixed"></div>
        <div class="block b-var" id="b-var"></div>
        <div class="block b-profit" id="b-profit"></div>
      </div>
      <!-- 右側：売上＆赤字 (会計の貸方) -->
      <div class="col">
        <div class="block b-loss" id="b-loss"></div>
        <div class="block b-rev" id="b-rev"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="btn-sell">商品を1つ売る 🎯</button>
    
    <div class="params">
      <span>単価: ¥1,000</span>
      <span>変動費: ¥600</span>
      <span>固定費: ¥5,000</span>
    </div>

    <button class="btn-reset" id="btn-reset">最初からやり直す</button>
  </div>
</div>

<script>
  // --- ゲームの基本設定 ---
  const PRICE = 1000;       // 商品単価 (売上)
  const VAR_COST = 600;     // 変動費 (仕入れ代など)
  const FIXED_COST = 5000;  // 固定費 (家賃・人件費など)
  
  // 限界利益 = 単価 - 変動費 (1つ売って手元に残るお金: 400円)
  // 損益分岐点販売量 = 固定費5000 ÷ 限界利益400 = 12.5 (13個で黒字)
  
  const MAX_SALES = 20;     // 上限販売個数
  const MAX_AMOUNT = Math.max(PRICE * MAX_SALES, FIXED_COST + (VAR_COST * MAX_SALES)); // グラフの高さ100%の基準値

  let salesCount = 0;

  // DOM要素の取得
  const btnSell = document.getElementById('btn-sell');
  const btnReset = document.getElementById('btn-reset');
  const statusTitle = document.getElementById('status-title');
  const statusDesc = document.getElementById('status-desc');

  const bFixed = document.getElementById('b-fixed');
  const bVar = document.getElementById('b-var');
  const bProfit = document.getElementById('b-profit');
  const bLoss = document.getElementById('b-loss');
  const bRev = document.getElementById('b-rev');

  // %計算用ヘルパー
  function getPercent(amount) {
    return (amount / MAX_AMOUNT) * 100;
  }

  // 画面の更新処理
  function updateView() {
    const totalRev = salesCount * PRICE;
    const totalVar = salesCount * VAR_COST;
    const totalCost = FIXED_COST + totalVar;
    const profit = totalRev - totalCost; // マイナスなら赤字

    // 1. テキスト（ダッシュボード）の更新
    if (profit < 0) {
      const marginalProfit = PRICE - VAR_COST; 
      const needMore = Math.ceil(Math.abs(profit) / marginalProfit);
      statusTitle.innerText = `あと ${needMore} 個売れば黒字！`;
      statusTitle.style.color = 'var(--text)';
    } else if (profit === 0) {
      statusTitle.innerText = `🎉 損益分岐点 ピッタリ到達！`;
      statusTitle.style.color = '#d97706'; // オレンジ
    } else {
      statusTitle.innerText = `📈 黒字化達成！`;
      statusTitle.style.color = '#16a34a'; // グリーン
    }

    statusDesc.innerText = `売上: ¥${totalRev.toLocaleString()} / 費用: ¥${totalCost.toLocaleString()}`;
    statusDesc.innerText += profit < 0 ? ` (赤字: ¥${Math.abs(profit).toLocaleString()})` : ` (利益: ¥${profit.toLocaleString()})`;

    // 2. ブロックのアニメーション更新（flex-basisで高さを制御）
    
    // 【左カラム】固定費・変動費・利益
    bFixed.style.flexBasis = `${getPercent(FIXED_COST)}%`;
    bFixed.innerText = `固定費\n¥${FIXED_COST.toLocaleString()}`;

    if (totalVar > 0) {
      bVar.style.flexBasis = `${getPercent(totalVar)}%`;
      bVar.innerText = `変動費\n¥${totalVar.toLocaleString()}`;
      bVar.style.opacity = 1;
    } else { bVar.style.flexBasis = `0%`; bVar.style.opacity = 0; }

    if (profit > 0) {
      bProfit.style.flexBasis = `${getPercent(profit)}%`;
      bProfit.innerText = `利益\n¥${profit.toLocaleString()}`;
      bProfit.style.opacity = 1;
    } else { bProfit.style.flexBasis = `0%`; bProfit.style.opacity = 0; }

    // 【右カラム】売上・赤字（純損失）
    if (totalRev > 0) {
      bRev.style.flexBasis = `${getPercent(totalRev)}%`;
      bRev.innerText = `売上\n¥${totalRev.toLocaleString()}`;
      bRev.style.opacity = 1;
    } else { bRev.style.flexBasis = `0%`; bRev.style.opacity = 0; }

    if (profit < 0) {
      const lossAmt = Math.abs(profit);
      bLoss.style.flexBasis = `${getPercent(lossAmt)}%`;
      bLoss.innerText = `赤字\n¥${lossAmt.toLocaleString()}`;
      bLoss.style.opacity = 1;
    } else { bLoss.style.flexBasis = `0%`; bLoss.style.opacity = 0; }

    // 3. 上限チェック
    if (salesCount >= MAX_SALES) {
      btnSell.disabled = true;
      btnSell.innerText = "上限に到達しました";
    } else {
      btnSell.disabled = false;
      btnSell.innerText = "商品を1つ売る 🎯";
    }
  }

  // --- イベントリスナー ---
  btnSell.addEventListener('click', () => {
    if (salesCount < MAX_SALES) {
      salesCount++;
      updateView();
      // ボタンのプチ押し込みアニメーション
      btnSell.style.transform = 'scale(0.92)';
      setTimeout(() => btnSell.style.transform = '', 100);
    }
  });

  btnReset.addEventListener('click', () => {
    salesCount = 0;
    updateView();
  });

  // 初回ロード時の描画
  updateView();
</script>
</body>
</html>
